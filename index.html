<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeTeZe</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrap">
    <nav class="nav">
        <a class="brand" href="/">✿ <span>NeTeZe</span></a>
        <div class="tabs">
            <a href="/" aria-current="page">Home</a>
            <a href="/games/">Games</a>
            <a href="/projects/">Projects</a>
            <a href="/links/">Links</a>
        </div>
    </nav>

    <main class="grid">
        <a class="card g1" href="/games/">
            <span class="glyph" aria-hidden="true">🎮</span>
            <h2>Games</h2>
            <div class="meta">
                <span class="go" aria-hidden="true">View →</span>
            </div>
        </a>

        <a class="card g2" href="/projects/">
            <span class="glyph" aria-hidden="true">🛠️</span>
            <h2>Dev projects</h2>
            <div class="meta">
                <span class="go" aria-hidden="true">Explore →</span>
            </div>
        </a>

        <a class="card g3" href="/links/">
            <span class="glyph" aria-hidden="true">🔗</span>
            <h2>My links</h2>
            <div class="meta">
                <span class="go" aria-hidden="true">View →</span>
            </div>
        </a>
    </main>
</div>

<script src="js/main.js"></script>
</body>
</html>
