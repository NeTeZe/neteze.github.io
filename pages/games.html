<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeTeZe · Games</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../css/style.css" />
    <!-- Font Awesome pour les étoiles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
<div class="wrap">
    <nav class="nav">
        <a class="brand" href="../index.html">✿ <span>NeTeZe</span></a>
        <div class="tabs">
            <a href="../index.html">Home</a>
            <a href="games.html" aria-current="page">Games</a>
            <a href="projects.html">Projects</a>
            <a href="links.html">Links</a>
        </div>
    </nav>

    <main>
        <h1>Games</h1>

        <div class="games-list">

            <!-- ===== Echoes of Wisdom ===== -->
            <article class="game">
                <div class="game-cover">
                    <!-- Pour mettre la jaquette : supprime la ligne <span> ci-dessous
                         et mets à la place :
                         <span class="game-cover-ph">Logo / jaquette du jeu</span> -->
                    <img src="../assets/covers/echoes-of-wisdom.png" alt="Echoes of Wisdom" />
                </div>

                <div class="game-info">
                    <h2>The Legend of Zelda: Echoes of Wisdom</h2>

                    <div class="stars" aria-label="3.5 sur 5">
                        <i class="fa-solid fa-star" aria-hidden="true"></i>
                        <i class="fa-solid fa-star" aria-hidden="true"></i>
                        <i class="fa-solid fa-star" aria-hidden="true"></i>
                        <i class="fa-solid fa-star-half-stroke" aria-hidden="true"></i>
                        <i class="fa-regular fa-star" aria-hidden="true"></i>
                        <span class="stars-num">3,5 / 5</span>
                    </div>

                    <p class="game-comment">Écris ton avis ici…</p>
                </div>
            </article>

            <!-- ===== Pour ajouter un jeu, copie le bloc <article class="game"> ci-dessus ===== -->

        </div>
    </main>
</div>

<script src="../js/main.js"></script>
</body>
</html>
